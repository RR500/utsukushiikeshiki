<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - うつくしいけしき</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&family=Noto+Sans+JP:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="favicon.svg" type="image/svg+xml">
</head>
<body>
    <nav>
        <div class="nav-inner">
        <a href="index.html">Home</a>
        <a href="gallery.html">Keshiki</a>
        <a href="post.html">Post</a>
        <a href="about.html">About</a>
        <a href="contact.html" class="active">Contact</a>
        </div>
    </nav>
    <main class="container" style="font-size: 1.21em; display:flex; flex-direction:column; justify-content:flex-end; padding-bottom: calc(34vh + 2rem);">
        <div class="section-title" style="margin-bottom: 1.5rem;">
            <h1>Contact</h1>
            <p class="subtitle">お問い合わせ</p>
        </div>

        <form id="contact-form" style="display: flex; flex-direction: column; gap: 1rem; max-width: 480px; min-height: 180px;">
            <div style="display: flex; gap: 2rem;">
                <input type="text" name="name" placeholder="名前 / Name" style="flex:1; padding: 0.5rem 0;" required>
                <input type="email" name="email" placeholder="メール / Email" style="flex:1; padding: 0.5rem 0;" required>
            </div>
            <textarea name="message" rows="3" placeholder="メッセージ / Message" style="width: 100%; padding: 0.5rem 0; resize: none;" required></textarea>
            <button type="submit" style="width: fit-content; padding: 0.6rem 2rem; align-self: center; margin-top: 5pt;">Send</button>
        </form>

        <div id="contact-thanks" class="thanks-message" style="display: none;">
            <p class="jp">メッセージありがとうございます。</p>
            <p class="en">Thank you for your message.</p>
        </div>
    </main>

    <a href="post.html" class="door-link">
        <div class="door-frame">
            <div class="door-panel">
                <div class="door-knob"></div>
            </div>
        </div>
    </a>
    <script src="script.js"></script>
</body>
</html>
